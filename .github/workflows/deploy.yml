name: Deploy site to GitHub Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout blog repository
        uses: actions/checkout@v4

      - name: Checkout Ard compiler
        uses: actions/checkout@v4
        with:
          repository: akonwi/ard
          path: ard

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: ard/compiler/go.sum

      - name: Download Go dependencies
        working-directory: ard/compiler
        run: go mod download

      - name: Generate stdlib FFI bridge code
        working-directory: ard/compiler
        run: go generate -tags=goexperiment.jsonv2 ./std_lib/ffi

      - name: Build Ard compiler
        working-directory: ard/compiler
        run: go build -tags=goexperiment.jsonv2 -o ${{ github.workspace }}/ard-compiler .

      - name: Build site
        run: ./ard-compiler run site.ard --target go

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
